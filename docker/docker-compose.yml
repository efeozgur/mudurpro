services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mudurpro
      POSTGRES_USER: mudurpro
      POSTGRES_PASSWORD: mudurpro_secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mudurpro"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ozgurapp.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://mudurpro:mudurpro_secret@db:5432/mudurpro
      JWT_SECRET: change-me-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../backend/src:/app/src

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "8080:80"
    depends_on:
      - app

volumes:
  pgdata:
